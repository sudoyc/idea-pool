<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Gemini Action Reader</title><style>:root{color-scheme:dark;--bg:#000;--side:#09090b;--panel:#18181b;--line:rgba(255,255,255,.065);--text:#fff;--body:#e4e4e7;--muted:#a1a1aa;--dim:#71717a;--accent:#c084fc;--soft:rgba(192,132,252,.15);--sans:Inter,"Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif;--mono:"JetBrains Mono",ui-monospace,monospace}*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--body);font-family:var(--sans);overflow:hidden}.app{height:100vh;display:grid;grid-template-columns:320px minmax(0,1fr)}.side{background:var(--side);border-right:1px solid var(--line);overflow:auto}.side-head{padding:24px 20px 18px;border-bottom:1px solid var(--line)}.brand{font:600 11px/1 var(--mono);letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:22px}.mode{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}.mode button{flex:1;border:0;background:#050506;color:var(--muted);padding:9px;font-size:12px;cursor:pointer}.mode button.active{background:var(--soft);color:var(--text)}.queue{padding:14px 12px}.item{padding:14px 12px;border-radius:9px;border:1px solid transparent;cursor:pointer}.item.active{background:var(--panel);border-color:rgba(192,132,252,.32)}.item h3{font-size:14px;margin:0 0 7px;color:var(--text)}.item p{font-size:12px;line-height:1.45;color:var(--dim);margin:0}.reader{overflow:auto;min-width:0}.layout{max-width:1040px;margin:0 auto;padding:68px 48px 86px;display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:52px}.crumb{font:600 12px/1 var(--mono);color:var(--accent);letter-spacing:.06em;margin-bottom:30px}h1{font-size:42px;line-height:1.07;letter-spacing:-.04em;margin:0 0 22px;color:var(--text)}.lead{font-size:16.5px;line-height:1.78;color:var(--body);margin:0 0 42px}.content h2{font-size:19px;margin:42px 0 14px;color:var(--text)}.content p{font-size:15.5px;line-height:1.78;color:var(--muted);margin:0}.action{position:sticky;top:48px;align-self:start;border:1px solid rgba(192,132,252,.28);background:#060506;border-radius:14px;overflow:hidden}.action-head{padding:13px 15px;border-bottom:1px solid var(--line);font:650 11px/1 var(--mono);letter-spacing:.1em;text-transform:uppercase;color:var(--accent)}.action-body{padding:18px 16px}.action-body p{margin:0 0 16px;color:var(--body);font:500 14px/1.65 var(--mono)}.action button{width:100%;border:1px solid rgba(192,132,252,.42);background:var(--soft);color:#eadcff;border-radius:9px;padding:11px;font-weight:750;cursor:pointer}.steps{margin-top:18px;border-top:1px solid var(--line);padding-top:14px}.step{display:flex;gap:9px;color:var(--muted);font-size:13px;line-height:1.5;margin-top:10px}.num{color:var(--accent);font-family:var(--mono)}.toast{position:fixed;right:18px;bottom:18px;opacity:0;transform:translateY(8px);transition:.18s;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--text);font-size:13px}.toast.show{opacity:1;transform:none}@media(max-width:960px){.layout{grid-template-columns:1fr}.action{position:static}}@media(max-width:760px){html,body{overflow:auto}.app{display:block;height:auto}.side{border-right:0}.queue{display:flex;overflow-x:auto}.item{min-width:230px}.layout{padding:42px 22px}}</style></head><body><div class="app"><aside class="side"><div class="side-head"><div class="brand">Action Reader</div><div class="mode" id="mode"><button class="active">Read</button><button>Build</button></div></div><div class="queue" id="queue"></div></aside><main class="reader"><div class="layout"><article class="content" id="content"></article><aside class="action" id="action"></aside></div></main></div><div class="toast" id="toast">Action copied to clipboard-style buffer</div><script>
const ideas=[['个人项目灵感池 Agent','PRODUCTIVITY / 98','把当前心情、时间和技术偏好转成可执行的 vibe coding 项目卡片。','它最能代表这个产品的核心价值：不是保存很多想法，而是把今天的冲动变成一个可以开始的项目。','本地输入、规则排序、可解释推荐、Markdown 导出。','先把 seed ideas 的字段补齐，然后实现一个按时间、心情、技术栈加权的排序器。'],['Agent Pack 生成器','DEV WORKFLOW / 93','根据项目目标生成给 AI coding agent 使用的任务包。','它让“和 AI 解释上下文”这件事变成可复用资产。','输入目标、边界和栈，输出 handoff README。','写模板：目标、禁止事项、文件树、验证命令、交付格式。'],['思路清仓工具','PERSONAL OS / 88','快速倾倒脑中杂念，再整理成可执行事项。','它适合放在 vibe coding 之前，先降低上下文噪音。','大文本框、拆条、三段状态、键盘操作。','实现 paste-to-items 和 now/later/trash 快捷键。']];let idx=0;const queue=document.getElementById('queue'),content=document.getElementById('content'),action=document.getElementById('action'),toast=document.getElementById('toast');function render(){queue.innerHTML=ideas.map((x,i)=>`<section class="item ${i===idx?'active':''}" data-i="${i}"><h3>${x[0]}</h3><p>${x[2]}</p></section>`).join('');const x=ideas[idx];content.innerHTML=`<div class="crumb">${x[1]}</div><h1>${x[0]}</h1><p class="lead">${x[2]}</p><h2>Why now</h2><p>${x[3]}</p><h2>MVP scope</h2><p>${x[4]}</p>`;action.innerHTML=`<div class="action-head">First 30 minutes</div><div class="action-body"><p>~ $ ${x[5]}</p><button id="copy">Copy action</button><div class="steps"><div class="step"><span class="num">01</span><span>打开项目目录并创建最小数据结构</span></div><div class="step"><span class="num">02</span><span>写出一条真实 seed idea</span></div><div class="step"><span class="num">03</span><span>让 UI 显示第一条结果</span></div></div></div>`;document.getElementById('copy').onclick=()=>show('Copied: '+x[0])}function show(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1300)}queue.onclick=e=>{const item=e.target.closest('.item');if(!item)return;idx=Number(item.dataset.i);render()};document.getElementById('mode').onclick=e=>{if(e.target.tagName!=='BUTTON')return;document.querySelectorAll('#mode button').forEach(b=>b.classList.toggle('active',b===e.target));show('Mode switched to '+e.target.textContent)};render();
</script></body></html>
