<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raycast Feed - Vibe Coding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #0A0A0A;
    --bg-surface: #141414;
    --bg-hover: #1A1A1A;
    --text-main: #EDEDED;
    --text-muted: #888888;
    --accent: #A855F7;
    --accent-glow: rgba(168, 85, 247, 0.15);
    --border: #222222;
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-color: var(--bg-base);
    color: var(--text-main);
    font-family: var(--font-sans);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    padding: 10vh 20px 40px;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  /* Command Bar */
  .command-bar {
    position: sticky;
    top: 20px;
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 100;
    margin-bottom: 24px;
    transition: all 0.2s ease;
  }
  .command-bar:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 8px 32px rgba(0,0,0,0.6);
  }
  .command-icon { color: var(--accent); font-size: 20px; }
  .command-input {
    flex: 1; background: transparent; border: none; color: var(--text-main);
    font-family: var(--font-sans); font-size: 18px; outline: none;
  }
  .command-input::placeholder { color: #555; }
  .meta-tag {
    font-family: var(--font-mono); font-size: 12px;
    background: #222; padding: 4px 8px; border-radius: 4px; color: var(--text-muted);
  }

  /* List Container */
  .feed-list { display: flex; flex-direction: column; gap: 4px; }

  /* Row Item */
  .row {
    background: transparent; border-radius: 8px;
    transition: background 0.15s ease;
    overflow: hidden;
  }
  .row:hover { background: var(--bg-hover); }
  
  .row-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px; cursor: pointer; user-select: none;
  }
  
  .row-title-group { display: flex; align-items: center; gap: 12px; }
  .row-title { font-size: 15px; font-weight: 500; letter-spacing: 0.3px; }
  .row-desc-preview { font-size: 14px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px;}
  
  .row-score {
    font-family: var(--font-mono); font-size: 13px; font-weight: 500;
    color: var(--accent); display: flex; align-items: center; gap: 6px;
  }

  /* Details Panel (Accordion) */
  .row-details {
    display: none;
    padding: 0 16px 24px 44px; /* offset to align with text */
    color: var(--text-muted);
    font-size: 14px;
    animation: slideDown 0.2s ease-out forwards;
  }
  .row.active .row-details { display: block; }
  .row.active { background: var(--bg-surface); }
  .row.active .row-desc-preview { display: none; }

  .detail-section { margin-top: 16px; }
  .detail-label { 
    font-size: 12px; font-weight: 600; text-transform: uppercase; 
    letter-spacing: 1px; color: #666; margin-bottom: 6px; 
  }
  .detail-text { color: #CCC; line-height: 1.7; }

  /* First 30 Mins Block */
  .action-block {
    margin-top: 20px;
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 16px;
    border-radius: 6px;
  }
  .action-block-title {
    font-family: var(--font-mono); font-size: 12px; color: var(--accent);
    margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
  }
  .action-block-text { color: var(--text-main); font-weight: 500; font-size: 14px;}

  .stack-tags { display: flex; gap: 8px; margin-top: 16px; }
  .stack-tag {
    font-family: var(--font-mono); font-size: 11px;
    color: #888; background: #1A1A1A; padding: 2px 6px; border-radius: 4px;
  }

  .actions { margin-top: 20px; display: flex; gap: 12px; }
  .btn {
    background: #222; border: none; color: #DDD; padding: 8px 16px;
    border-radius: 6px; font-size: 13px; cursor: pointer; transition: 0.2s;
    font-family: var(--font-sans); font-weight: 500;
  }
  .btn:hover { background: #333; color: #FFF; }
  .btn-primary { background: var(--accent-glow); color: var(--accent); }
  .btn-primary:hover { background: var(--accent); color: #FFF; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="container">
  <div class="command-bar">
    <div class="command-icon">✨</div>
    <input type="text" class="command-input" placeholder="输入心情、时间、想用的技术栈..." value="想写点东西，有 2 小时，偏好 React">
    <div class="meta-tag">5 Results</div>
  </div>

  <div class="feed-list" id="feed">
    </div>
</div>

<script>
  const ideas = [
    {
      title: "个人项目灵感池 Agent", desc: "把当前心情、时间和技术偏好转成可执行的 vibe coding 项目卡片。",
      why: "它直接解决“想写点东西但不知道写什么”的启动问题，做完后还能反复服务后续项目。",
      mvp: "本地表单输入方向、时间、技术栈和约束，规则生成 3-8 张项目卡，并支持复制/下载 Markdown。",
      action: "先把已有 idea 固化成 seed 数据，再做一个 deterministic 排序器。", stack: ["Vite", "React", "TypeScript", "localStorage"], score: 98
    },
    {
      title: "Agent Pack 生成器", desc: "根据项目目标生成给 AI coding agent 使用的任务包、约束、检查清单。",
      why: "标准化任务包可以减少反复解释。",
      mvp: "输入项目目标和技术栈，输出 README 风格的 Agent Pack 文档。",
      action: "定义 Agent Pack 模板：目标、边界、文件路径、验证命令、交付格式。", stack: ["React", "TypeScript", "Markdown"], score: 91
    },
    {
      title: "思路清仓工具", desc: "快速倾倒脑中杂念，再整理成可执行事项、以后再说和直接丢弃。",
      why: "vibe coding 前经常需要先清空上下文，它能降低启动摩擦。",
      mvp: "一个大文本框 + 分类按钮，把输入拆成小条并拖到不同篮子。",
      action: "做三列看板：现在做、以后做、丢掉。", stack: ["React", "TypeScript", "localStorage"], score: 87
    },
    {
      title: "README Hero 生成器", desc: "给 GitHub 项目生成漂亮的 README 顶部 hero、徽章和一句话定位。",
      why: "小范围、反馈快，适合给现有项目提升展示效果。",
      mvp: "输入项目名、定位、配色，输出 Markdown hero 区块。",
      action: "先做 5 个 hero 模板和 badge 组合。", stack: ["React", "TypeScript", "SVG"], score: 82
    },
    {
      title: "个人服务目录", desc: "记录个人部署的服务、域名、用途、登录方式和运维备注。",
      why: "能降低服务散落带来的记忆成本。",
      mvp: "本地服务卡片 CRUD，支持按域名/用途/状态过滤。",
      action: "做一个 localStorage 的服务目录表单和列表。", stack: ["React", "TypeScript", "localStorage"], score: 79
    }
  ];

  const feed = document.getElementById('feed');

  ideas.forEach((idea, index) => {
    const row = document.createElement('div');
    row.className = `row ${index === 0 ? 'active' : ''}`;
    
    row.innerHTML = `
      <div class="row-header" onclick="this.parentElement.classList.toggle('active')">
        <div class="row-title-group">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
          <span class="row-title">${idea.title}</span>
          <span class="row-desc-preview">${idea.desc}</span>
        </div>
        <div class="row-score">${idea.score}%</div>
      </div>
      <div class="row-details">
        <div class="detail-text">${idea.desc}</div>
        
        <div class="detail-section">
          <div class="detail-label">Why Now</div>
          <div class="detail-text">${idea.why}</div>
        </div>

        <div class="detail-section">
          <div class="detail-label">MVP</div>
          <div class="detail-text">${idea.mvp}</div>
        </div>

        <div class="action-block">
          <div class="action-block-title">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
            FIRST 30 MINS ACTION
          </div>
          <div class="action-block-text">${idea.action}</div>
        </div>

        <div class="stack-tags">
          ${idea.stack.map(s => `<span class="stack-tag">${s}</span>`).join('')}
        </div>

        <div class="actions">
          <button class="btn btn-primary" onclick="alert('Started Vibe Coding!')">Lock & Start</button>
          <button class="btn" onclick="alert('Markdown Copied!')">Copy as MD</button>
        </div>
      </div>
    `;
    feed.appendChild(row);
  });
</script>
</body>
</html>
