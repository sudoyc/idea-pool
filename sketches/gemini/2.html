<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Split Pane - Vibe Coding</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-sidebar: #111111;
    --bg-main: #0A0A0C;
    --border: #27272A;
    --text-primary: #F4F4F5;
    --text-secondary: #A1A1AA;
    --text-tertiary: #52525B;
    --accent: #C084FC;
    --accent-bg: rgba(192, 132, 252, 0.1);
    --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "PingFang SC", "Noto Sans SC", sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    background-color: var(--bg-main); color: var(--text-primary);
    font-family: var(--font-sans); height: 100vh; overflow: hidden;
    display: flex; -webkit-font-smoothing: antialiased;
  }

  /* --- Sidebar (Left Pane) --- */
  .sidebar {
    width: 320px; min-width: 320px; background: var(--bg-sidebar);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
  }

  /* Tiny Control Panel */
  .control-panel {
    padding: 20px; border-bottom: 1px solid var(--border);
  }
  .control-title {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    color: var(--text-tertiary); margin-bottom: 12px; letter-spacing: 0.5px;
  }
  .pseudo-input {
    background: #18181B; border: 1px solid var(--border); border-radius: 6px;
    padding: 8px 12px; font-size: 13px; color: var(--text-secondary);
    display: flex; justify-content: space-between; cursor: pointer; margin-bottom: 8px;
  }

  /* List Area */
  .list-header {
    padding: 16px 20px 8px; font-size: 11px; font-weight: 600;
    color: var(--text-tertiary); letter-spacing: 0.5px;
  }
  .idea-list { flex: 1; overflow-y: auto; padding: 0 10px 20px; }
  .list-item {
    padding: 12px 10px; border-radius: 6px; cursor: pointer;
    margin-bottom: 2px; transition: background 0.1s;
  }
  .list-item:hover { background: #18181B; }
  .list-item.active { background: var(--accent-bg); }
  .list-item.active .item-title { color: var(--accent); }
  
  .item-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .item-meta { 
    font-size: 12px; color: var(--text-secondary); 
    display: flex; justify-content: space-between; font-family: var(--font-mono);
  }

  /* --- Main Pane (Right Pane) --- */
  .main-content {
    flex: 1; overflow-y: auto; display: flex; justify-content: center;
  }
  .article {
    width: 100%; max-width: 760px; padding: 64px 40px;
  }

  /* Markdown Typography */
  h1 { font-size: 32px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 16px; line-height: 1.2; }
  .metadata-bar {
    display: flex; gap: 16px; border-bottom: 1px solid var(--border);
    padding-bottom: 24px; margin-bottom: 32px;
  }
  .badge {
    font-family: var(--font-mono); font-size: 13px; color: var(--text-secondary);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .badge-score { color: var(--accent); font-weight: 500; }

  h2 {
    font-size: 18px; font-weight: 600; margin: 40px 0 16px;
    color: var(--text-primary); letter-spacing: -0.3px;
  }
  p {
    font-size: 15px; color: #D4D4D8; line-height: 1.75; margin-bottom: 16px;
  }

  /* Callout Block for Action */
  .callout {
    margin-top: 48px; padding: 24px; border-radius: 8px;
    background: linear-gradient(145deg, #18181B 0%, #111 100%);
    border: 1px solid var(--border); position: relative; overflow: hidden;
  }
  .callout::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent);
  }
  .callout-title {
    font-family: var(--font-mono); font-size: 13px; color: var(--accent); margin-bottom: 12px; text-transform: uppercase;
  }
  .callout p { margin: 0; color: #FFF; font-weight: 500; font-size: 16px; }

  /* Tags */
  .tags { margin-top: 40px; display: flex; gap: 8px; }
  .tag { background: #18181B; border: 1px solid var(--border); padding: 4px 10px; border-radius: 4px; font-size: 12px; color: var(--text-secondary); font-family: var(--font-mono); }
</style>
</head>
<body>

<div class="sidebar">
  <div class="control-panel">
    <div class="control-title">Current Context</div>
    <div class="pseudo-input">
      <span>Mood: Vibe Coding</span>
      <span style="color:#666">▾</span>
    </div>
    <div class="pseudo-input">
      <span>Time: 2 Hours</span>
      <span style="color:#666">▾</span>
    </div>
  </div>
  
  <div class="list-header">RECENT IDEAS</div>
  <div class="idea-list" id="idea-list">
    </div>
</div>

<div class="main-content">
  <div class="article" id="article-content">
    </div>
</div>

<script>
  const ideas = [
    {
      title: "个人项目灵感池 Agent", desc: "把当前心情、时间和技术偏好转成可执行的 vibe coding 项目卡片。",
      why: "它直接解决“想写点东西但不知道写什么”的启动问题，做完后还能反复服务后续项目。",
      mvp: "本地表单输入方向、时间、技术栈和约束，规则生成 3-8 张项目卡，并支持复制/下载 Markdown。",
      action: "先把已有 idea 固化成 seed 数据，再做一个 deterministic 排序器。", stack: ["Vite", "React", "TypeScript", "localStorage"], score: 98, date: "10:24 AM"
    },
    {
      title: "Agent Pack 生成器", desc: "根据项目目标生成给 AI coding agent 使用的任务包、约束、检查清单和交接 prompt。",
      why: "标准化任务包可以减少反复解释。",
      mvp: "输入项目目标和技术栈，输出 README 风格的 Agent Pack 文档。",
      action: "定义 Agent Pack 模板：目标、边界、文件路径、验证命令、交付格式。", stack: ["React", "TypeScript", "Markdown"], score: 91, date: "Yesterday"
    },
    {
      title: "思路清仓工具", desc: "快速倾倒脑中杂念，再整理成可执行事项、以后再说和直接丢弃。",
      why: "vibe coding 前经常需要先清空上下文，它能降低启动摩擦。",
      mvp: "一个大文本框 + 分类按钮，把输入拆成小条并拖到不同篮子。",
      action: "做三列看板：现在做、以后做、丢掉。", stack: ["React", "TypeScript", "localStorage"], score: 87, date: "Yesterday"
    },
    {
      title: "README Hero 生成器", desc: "给 GitHub 项目生成漂亮的 README 顶部 hero、徽章和一句话定位。",
      why: "小范围、反馈快，适合给现有项目提升展示效果。",
      mvp: "输入项目名、定位、配色，输出 Markdown hero 区块。",
      action: "先做 5 个 hero 模板和 badge 组合。", stack: ["React", "TypeScript", "SVG"], score: 82, date: "Mon"
    },
    {
      title: "个人服务目录", desc: "记录个人部署的服务、域名、用途、登录方式和运维备注。",
      why: "能降低服务散落带来的记忆成本。",
      mvp: "本地服务卡片 CRUD，支持按域名/用途/状态过滤。",
      action: "做一个 localStorage 的服务目录表单和列表。", stack: ["React", "TypeScript", "localStorage"], score: 79, date: "Sun"
    }
  ];

  const listEl = document.getElementById('idea-list');
  const articleEl = document.getElementById('article-content');

  function renderArticle(index) {
    const idea = ideas[index];
    
    // Update active state in list
    document.querySelectorAll('.list-item').forEach((el, i) => {
      el.classList.toggle('active', i === index);
    });

    // Render right pane
    articleEl.innerHTML = `
      <h1>${idea.title}</h1>
      <div class="metadata-bar">
        <span class="badge badge-score">★ Score: ${idea.score}</span>
        <span class="badge">Stack: ${idea.stack[0]}...</span>
      </div>

      <p>${idea.desc}</p>

      <h2>为什么适合现在做 (Why Now)</h2>
      <p>${idea.why}</p>

      <h2>最小可行性产品 (MVP)</h2>
      <p>${idea.mvp}</p>

      <div class="callout">
        <div class="callout-title">🚀 First 30 Mins Action</div>
        <p>${idea.action}</p>
      </div>

      <div class="tags">
        ${idea.stack.map(s => `<span class="tag">${s}</span>`).join('')}
      </div>
    `;
  }

  // Render left list
  ideas.forEach((idea, index) => {
    const div = document.createElement('div');
    div.className = `list-item ${index === 0 ? 'active' : ''}`;
    div.onclick = () => renderArticle(index);
    div.innerHTML = `
      <div class="item-title">${idea.title}</div>
      <div class="item-meta">
        <span>${idea.stack[0]}</span>
        <span>${idea.date}</span>
      </div>
    `;
    listEl.appendChild(div);
  });

  // Init
  renderArticle(0);
</script>
</body>
</html>
