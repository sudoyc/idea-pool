<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Gemini Workbench Notes</title>
  <style>:root{color-scheme:dark;--bg:#000;--side:#09090b;--panel:#15151a;--line:rgba(255,255,255,.07);--text:#fff;--body:#e4e4e7;--muted:#a1a1aa;--dim:#71717a;--accent:#c084fc;--soft:rgba(192,132,252,.14);--sans:Inter,"Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif;--mono:"JetBrains Mono",ui-monospace,monospace}*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--body);font-family:var(--sans);overflow:hidden}.app{height:100vh;display:grid;grid-template-columns:304px minmax(0,1fr) 286px}.left,.right{background:var(--side);border-color:var(--line);min-width:0;overflow:hidden}.left{border-right:1px solid var(--line);display:flex;flex-direction:column}.right{border-left:1px solid var(--line);padding:24px 18px;overflow:auto}.brand{padding:24px 20px 18px;border-bottom:1px solid var(--line);font:600 11px/1 var(--mono);letter-spacing:.15em;text-transform:uppercase;color:var(--accent)}.filters{padding:16px 14px;border-bottom:1px solid var(--line);display:grid;gap:8px}.filters button{border:1px solid var(--line);background:#050506;color:var(--muted);border-radius:8px;padding:9px 10px;text-align:left;font-size:12px;cursor:pointer}.filters button.active{background:var(--soft);border-color:rgba(192,132,252,.35);color:var(--text)}.list{overflow:auto;padding:12px}.item{padding:13px 12px;border-radius:9px;border:1px solid transparent;cursor:pointer}.item+ .item{margin-top:4px}.item.active{background:var(--panel);border-color:rgba(192,132,252,.3)}.item h3{margin:0;font-size:14px;color:var(--text)}.item p{margin:6px 0 0;color:var(--dim);font-size:12px;line-height:1.45}.main{overflow:auto;min-width:0}.doc{max-width:760px;margin:0 auto;padding:72px 46px 92px}.crumb{font:600 12px/1 var(--mono);color:var(--accent);letter-spacing:.05em;margin-bottom:30px}h1{font-size:40px;line-height:1.08;letter-spacing:-.04em;margin:0 0 22px;color:var(--text)}.lead{font-size:16px;line-height:1.78;margin:0 0 44px;color:var(--body)}h2{font-size:19px;margin:42px 0 14px;color:var(--text)}p{font-size:15.5px;line-height:1.78;color:var(--muted);margin:0}.quote{border-left:2px solid var(--accent);padding-left:18px;margin:34px 0;color:#ded4ee}.note-title{font:650 11px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:14px}.note{border-bottom:1px solid var(--line);padding:0 0 18px;margin-bottom:18px}.note b{display:block;font-size:13px;color:var(--text);margin-bottom:8px}.note textarea{width:100%;min-height:88px;resize:vertical;background:#050506;border:1px solid var(--line);border-radius:8px;color:var(--body);padding:10px;font:13px/1.55 var(--sans);outline:0}.todo{display:flex;gap:10px;color:var(--muted);font-size:13px;line-height:1.45;margin-top:10px;cursor:pointer}.box{width:15px;height:15px;border:1px solid rgba(192,132,252,.55);margin-top:2px}.todo.done{color:var(--dim);text-decoration:line-through}.todo.done .box{background:var(--accent)}.mobile-note{display:none}@media(max-width:1050px){.app{grid-template-columns:304px minmax(0,1fr)}.right{display:none}.mobile-note{display:block;border-top:1px solid var(--line);margin-top:40px;padding-top:24px}}@media(max-width:760px){html,body{overflow:auto}.app{display:block;height:auto}.left{border-right:0}.list{display:flex;overflow-x:auto}.item{min-width:230px}.doc{padding:42px 22px}}</style>
</head><body><div class="app"><aside class="left"><div class="brand">Vibe Coding Workbench</div><nav class="filters" id="filters"><button class="active" data-f="all">All / 全部</button><button data-f="core">Core candidates</button><button data-f="writing">Writing tools</button></nav><div class="list" id="list"></div></aside><main class="main"><article class="doc" id="doc"></article></main><aside class="right"><div class="note-title">Workspace Notes</div><div class="note"><b>Selection rationale</b><textarea id="memo">这个方向要继续保留 gemini/3.html 的阅读质感，先别回到卡片网格。</textarea></div><div class="note"><b>Decision checklist</b><div class="todo"><span class="box"></span><span>中文正文阅读是否舒服</span></div><div class="todo"><span class="box"></span><span>左侧输入是否不像 SaaS 表单</span></div><div class="todo"><span class="box"></span><span>首个 30 分钟行动是否醒目</span></div></div></aside></div><script>
const ideas=[{f:'core',t:'个人项目灵感池 Agent',s:'把今天的状态转成可执行项目。',lead:'这是最适合作为主线的 idea，因为它直接服务当前产品，也能不断 dogfood 自己。',why:'页面不需要假装自己是 dashboard，它应该像一个私人工作台：左边是上下文和历史，右边是当前选中的可执行文档。',mvp:'保留本地优先、规则推荐、Markdown 导出。先把视觉结构稳定下来，再考虑更多生成逻辑。'},{f:'core',t:'Agent Pack 生成器',s:'生成给 AI coding agent 的任务包。',lead:'它和真实开发流程距离很近，适合做成 library 中的高价值模板。',why:'长期看，用户会反复使用相同结构的 handoff，因此资料库气质比一次性生成更重要。',mvp:'输入目标和边界，输出 agent 可执行的 README。'},{f:'core',t:'思路清仓工具',s:'把脑中杂念拆成可处理条目。',lead:'更偏 personal OS，能补足 vibe coding 前的上下文清理。',why:'它要求交互很轻，视觉上不能变成任务管理 dashboard。',mvp:'文本倾倒、自动拆条、Now/Later/Trash。'},{f:'writing',t:'README Hero 生成器',s:'生成项目 README 第一屏。',lead:'适合放在写作工具分组里，输出天然是文档。',why:'如果走这个方向，右侧文档区可以直接成为编辑器，而不是预览卡片。',mvp:'生成标题、subtitle、功能点、quick start。'},{f:'writing',t:'个人服务目录',s:'整理自己能提供的小服务。',lead:'偏展示，但仍可以复用当前工作台结构。',why:'它需要克制商业化视觉，保持个人 notebook 的可信感。',mvp:'本地编辑条目并导出静态 HTML。'}];let selected=0,filter='all';const list=document.getElementById('list'),doc=document.getElementById('doc');function visible(){return ideas.filter(i=>filter==='all'||i.f===filter)}function renderList(){const v=visible();if(!v[selected])selected=0;list.innerHTML=v.map((i,idx)=>`<section class="item ${idx===selected?'active':''}" data-i="${idx}"><h3>${i.t}</h3><p>${i.s}</p></section>`).join('')}function renderDoc(){const i=visible()[selected];doc.innerHTML=`<div class="crumb">${i.f.toUpperCase()} / WORKBENCH NOTE</div><h1>${i.t}</h1><p class="lead">${i.lead}</p><div class="quote">${i.s}</div><h2>Design implication</h2><p>${i.why}</p><h2>MVP boundary</h2><p>${i.mvp}</p><section class="mobile-note"><h2>Decision checklist</h2><p>中文正文阅读是否舒服；左侧输入是否不像 SaaS 表单；首个 30 分钟行动是否醒目。</p></section>`}list.onclick=e=>{const item=e.target.closest('.item');if(!item)return;selected=Number(item.dataset.i);renderList();renderDoc()};document.getElementById('filters').onclick=e=>{if(!e.target.dataset.f)return;filter=e.target.dataset.f;selected=0;document.querySelectorAll('#filters button').forEach(b=>b.classList.toggle('active',b===e.target));renderList();renderDoc()};document.querySelectorAll('.todo').forEach(t=>t.onclick=()=>t.classList.toggle('done'));renderList();renderDoc();
</script></body></html>
