<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gemini Command Library - Project Idea Pool</title>
  <style>
    :root{color-scheme:dark;--bg:#000;--side:#09090b;--surface:#18181b;--hover:#27272a;--line:rgba(255,255,255,.065);--focus:rgba(192,132,252,.34);--text:#f8f7ff;--primary:#e4e4e7;--muted:#a1a1aa;--dim:#71717a;--accent:#c084fc;--soft:rgba(192,132,252,.13);--sans:Inter,"Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif;--mono:"JetBrains Mono","Fira Code",ui-monospace,SFMono-Regular,Menlo,monospace}*{box-sizing:border-box}html,body{height:100%;margin:0;background:var(--bg);color:var(--primary);font-family:var(--sans);overflow:hidden}button,input{font:inherit}.app{height:100vh;display:grid;grid-template-columns:356px minmax(0,1fr)}.sidebar{background:var(--side);border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0}.top{padding:22px 20px 18px;border-bottom:1px solid var(--line);background:rgba(9,9,11,.92)}.brand{font:600 11px/1 var(--mono);letter-spacing:.15em;text-transform:uppercase;color:var(--accent);display:flex;gap:8px;align-items:center;margin-bottom:19px}.dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent)}.command{border:1px solid var(--focus);background:#050506;border-radius:12px;padding:12px 13px;box-shadow:inset 0 1px 0 rgba(255,255,255,.03)}.command label{display:block;color:var(--dim);font:650 10px/1 var(--mono);letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}.command input{width:100%;border:0;outline:0;background:transparent;color:var(--text);font-size:18px;line-height:1.35;letter-spacing:-.02em}.quick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.quick button{border:1px solid var(--line);background:#050506;color:var(--muted);border-radius:8px;padding:9px 10px;font-size:12px;text-align:left;cursor:pointer}.quick button:hover{background:var(--surface);color:var(--text)}.section-label{padding:18px 20px 10px;color:var(--dim);font:650 10px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase}.list{overflow:auto;padding:0 12px 22px}.item{padding:14px 12px;margin-bottom:4px;border:1px solid transparent;border-radius:9px;cursor:pointer;position:relative}.item:hover{background:var(--surface)}.item.active{background:var(--surface);border-color:var(--focus);box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}.item.active:before{content:"";position:absolute;left:-1px;top:11px;bottom:11px;width:3px;background:var(--accent);border-radius:4px}.item h3{margin:0 0 6px;font-size:14px;line-height:1.35;color:var(--primary)}.item p{margin:0;color:var(--dim);font-size:12px;line-height:1.45}.meta{display:flex;justify-content:space-between;margin-top:9px;color:var(--dim);font:600 11px/1 var(--mono)}.main{overflow:auto;min-width:0}.doc{max-width:860px;margin:0 auto;padding:66px 52px 90px}.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:34px}.crumb{font:600 12px/1 var(--mono);letter-spacing:.05em;color:var(--accent)}.actions{display:flex;gap:8px}.actions button{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:8px;padding:8px 10px;font-size:12px;cursor:pointer}.actions button.primary{background:var(--soft);border-color:var(--focus);color:#eadcff}h1{margin:0 0 22px;color:var(--text);font-size:clamp(34px,4vw,44px);line-height:1.08;letter-spacing:-.04em}.lead{font-size:16px;line-height:1.78;color:var(--primary);margin:0 0 36px}.section{border-top:1px solid var(--line);padding-top:18px;margin-top:34px}.section h2{font-size:18px;line-height:1.25;margin:0 0 13px;color:var(--text);letter-spacing:-.02em}.section p{margin:0;color:var(--muted);font-size:15px;line-height:1.75}.runbook{margin-top:38px;border:1px solid var(--focus);background:#050505;border-radius:12px;overflow:hidden}.run-head{display:flex;justify-content:space-between;padding:12px 15px;border-bottom:1px solid var(--line);color:var(--dim);font:600 11px/1 var(--mono);letter-spacing:.08em}.run-body{padding:20px 18px;font:500 14px/1.65 var(--mono);color:var(--primary)}.prompt{color:var(--accent);margin-right:9px}.notes{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:34px}.note{border:1px solid var(--line);background:rgba(255,255,255,.02);border-radius:10px;padding:15px}.note b{display:block;color:var(--text);font-size:13px;margin-bottom:7px}.note span{color:var(--muted);font-size:13px;line-height:1.55}.toast{position:fixed;right:18px;bottom:18px;opacity:0;transform:translateY(8px);transition:.18s;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:11px 13px;color:var(--text);font-size:13px}.toast.show{opacity:1;transform:none}@media(max-width:860px){html,body{overflow:auto}.app{height:auto;grid-template-columns:1fr}.sidebar{border-right:0;border-bottom:1px solid var(--line)}.list{display:flex;overflow-x:auto}.item{min-width:245px}.doc{padding:44px 22px}.notes{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="app"><aside class="sidebar"><div class="top"><div class="brand"><span class="dot"></span>Vibe Coding Pool</div><div class="command"><label>Command Brief</label><input id="brief" value="今晚 2 小时 / 想做开发者外脑 / React 本地优先"></div><div class="quick"><button data-brief="20 分钟热身 / 不要新依赖 / 写完能自用">20 min warmup</button><button data-brief="周末项目 / 可以做完整导出 / TypeScript">Weekend build</button><button data-brief="写作工具 / README 和文档优先 / 少 UI">Writing mode</button><button data-brief="个人 OS / 长期维护 / 本地数据">Personal OS</button></div></div><div class="section-label">Library Matches</div><div class="list" id="list"></div></aside><main class="main"><article class="doc" id="doc"></article></main></div><div class="toast" id="toast">Brief updated, library re-ranked</div>
  <script>
    const ideas=[{t:'个人项目灵感池 Agent',c:'PRODUCTIVITY TOOL',s:98,d:'把心情、时间和技术偏好转成今天可以立刻开工的项目卡。',w:'它是这个产品自己的 dogfood：如果它能推荐自己，就说明输入和输出关系是成立的。',m:'本地表单、deterministic 排序、结构化详情、复制 Markdown。',a:'先把 21 个 seed ideas 补齐字段，并写一个 explainable score。',n:['最适合作为 V1 主线','可长期沉淀成个人项目库']},{t:'Agent Pack 生成器',c:'DEVELOPER WORKFLOW',s:93,d:'把模糊目标改写成 coding agent 可以执行的任务包。',w:'AI 协作越来越依赖上下文质量，任务包会变成个人开发基础设施。',m:'输入目标、边界、技术栈，输出 handoff README。',a:'定义 Agent Pack 模板：目标、边界、文件、命令、验收。',n:['和当前工作流强相关','输出天然适合 Markdown']},{t:'思路清仓工具',c:'PERSONAL OS',s:88,d:'把脑中杂念倾倒出来，整理成现在做、以后做和丢弃。',w:'很多时候不是没 idea，而是上下文噪音太高。',m:'大文本框、自动拆条、三段状态、键盘操作。',a:'先实现 paste-to-items，把多行输入拆成独立条目。',n:['结构要极简','交互比视觉更重要']},{t:'README Hero 生成器',c:'WRITING TOOL',s:84,d:'为小项目生成 README 第一屏：定位、截图占位、快速开始。',w:'做完项目后的包装成本，经常决定它会不会被再次使用。',m:'输入项目名和功能点，生成可编辑 Markdown hero。',a:'拆解 5 个优秀 README hero 的段落结构。',n:['可做成写作 block','适合复制导出']},{t:'个人服务目录',c:'PERSONAL SITE',s:79,d:'整理自己可提供的小服务，生成一个可分享的轻量目录。',w:'个人能力需要稳定入口，而不是散在聊天记录里。',m:'本地编辑服务条目，筛选受众，导出静态 HTML。',a:'列出 6 个真实服务，每个写清对象、交付物、周期。',n:['更偏展示站','需要避免 SaaS 营销感']}];let selected=0;const list=document.getElementById('list'),doc=document.getElementById('doc'),toast=document.getElementById('toast');function renderList(){list.innerHTML=ideas.map((i,idx)=>`<section class="item ${idx===selected?'active':''}" data-i="${idx}"><h3>${i.t}</h3><p>${i.d}</p><div class="meta"><span>${i.c}</span><span>${i.s}</span></div></section>`).join('')}function renderDoc(){const i=ideas[selected];doc.innerHTML=`<div class="toolbar"><div class="crumb">${i.c} / MATCH ${i.s}</div><div class="actions"><button id="copy">Copy</button><button class="primary" id="start">Start session</button></div></div><h1>${i.t}</h1><p class="lead">${i.d}</p><section class="section"><h2>Why this fits tonight</h2><p>${i.w}</p></section><section class="section"><h2>MVP boundary</h2><p>${i.m}</p></section><div class="runbook"><div class="run-head"><span>FIRST_30_MINS.sh</span><span>local only</span></div><div class="run-body"><span class="prompt">~ $</span>${i.a}</div></div><div class="notes">${i.n.map(x=>`<div class="note"><b>Design note</b><span>${x}</span></div>`).join('')}</div>`;document.getElementById('copy').onclick=()=>show('Copied outline');document.getElementById('start').onclick=()=>show('Session started: '+i.t)}function show(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1300)}list.onclick=e=>{const item=e.target.closest('.item');if(!item)return;selected=Number(item.dataset.i);renderList();renderDoc()};document.querySelector('.quick').onclick=e=>{if(!e.target.dataset.brief)return;document.getElementById('brief').value=e.target.dataset.brief;show('Brief updated, library re-ranked')};renderList();renderDoc();
  </script>
</body>
</html>
