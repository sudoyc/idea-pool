<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Focus Deck - Project Idea Pool</title>
  <style>
    :root{color-scheme:dark;--bg:#08060d;--panel:#14111c;--line:rgba(255,255,255,.1);--text:#f6f0ff;--muted:#b1a9c0;--dim:#7b7388;--accent:#bd7cff;--red:#ff8a9a;--green:#87e6b0;--sans:Inter,"Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif;--mono:"JetBrains Mono",ui-monospace,monospace}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}.wrap{width:min(960px,calc(100vw - 36px));min-height:100vh;margin:0 auto;padding:32px 0;display:grid;place-items:center}.stage{width:100%}.context{margin:0 auto 24px;width:fit-content;max-width:100%;border:1px solid var(--line);border-radius:999px;padding:9px 13px;color:var(--muted);font-size:13px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center}.context button{border:0;background:transparent;color:var(--accent);font-weight:750;cursor:pointer}.deck{position:relative;width:min(760px,100%);margin:0 auto}.deck:before,.deck:after{content:"";position:absolute;inset:18px 18px -18px;border:1px solid var(--line);background:#0e0b14;z-index:-1}.deck:after{inset:36px 36px -36px;background:#0b0910}.card{border:1px solid var(--line);background:var(--panel);padding:42px clamp(22px,6vw,56px);min-height:520px;display:flex;flex-direction:column}.kicker{font:700 11px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--accent);display:flex;justify-content:space-between;gap:20px}h1{font-size:clamp(36px,6vw,56px);line-height:1.02;letter-spacing:-.055em;margin:28px 0 18px}.summary{font-size:17px;line-height:1.68;color:#ddd5e9;margin:0 0 28px}.split{display:grid;grid-template-columns:1fr 1fr;gap:26px;margin-top:auto}.block{border-top:1px solid var(--line);padding-top:15px}.block h2{margin:0 0 8px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}.block p{margin:0;color:var(--muted);font-size:15px;line-height:1.65}.actions{display:flex;justify-content:center;gap:12px;margin-top:56px;flex-wrap:wrap}.actions button{border:1px solid var(--line);background:#111019;color:var(--text);border-radius:999px;padding:13px 18px;font-weight:800;cursor:pointer}.actions .reject{color:var(--red)}.actions .pin{color:var(--green);border-color:rgba(135,230,176,.35)}.actions .next{color:#ead8ff;border-color:rgba(189,124,255,.45);background:rgba(189,124,255,.12)}.toast{position:fixed;left:50%;bottom:18px;transform:translate(-50%,10px);opacity:0;transition:.18s;border:1px solid var(--line);background:#15121d;border-radius:999px;padding:11px 15px;font-size:13px}.toast.show{opacity:1;transform:translate(-50%,0)}@media(max-width:720px){.wrap{display:block}.stage{padding-top:28px}.split{grid-template-columns:1fr}.card{min-height:auto}.deck:before,.deck:after{display:none}.actions{margin-top:28px}}
  </style>
</head>
<body>
  <main class="wrap"><section class="stage"><div class="context"><span id="contextText">Mood: 想快速进入心流 · Time: 2 hours · Stack: React</span><button id="edit">Edit brief</button></div><div class="deck"><article class="card" id="card"></article></div><nav class="actions"><button class="reject" id="reject">Reject</button><button class="pin" id="pin">Pin idea</button><button class="next" id="next">Next match</button></nav></section></main><div class="toast" id="toast">Pinned to tonight</div>
  <script>
    const ideas=[
      ['个人项目灵感池 Agent','PRODUCTIVITY / 98','把当前心情、时间和技术偏好转成可执行的 vibe coding 项目卡片。','本地输入、deterministic 排序、Markdown 导出，不引入后端或 LLM API。','先整理 seed JSON，然后实现一个能解释推荐原因的排序器。'],
      ['Agent Pack 生成器','DEV WORKFLOW / 93','为 AI coding agent 生成任务包、边界和验收清单。','输入项目目标后，输出一份可直接交给 agent 的 README handoff。','写出 Agent Pack 模板，并用当前项目做一次 dogfood。'],
      ['思路清仓工具','PERSONAL OS / 88','快速倾倒脑中杂念，再整理成现在做、以后做、直接丢弃。','大文本框 + 三段整理，不做复杂项目管理。','完成 paste-to-items 和快捷键分类。'],
      ['README Hero 生成器','WRITING / 84','给小项目生成 README 第一屏，降低分享和复盘成本。','生成标题、定位句、截图占位、快速开始四段。','抽象 5 个优秀 README hero 的结构。'],
      ['个人服务目录','PERSONAL SITE / 79','把自己能提供的小服务整理成可分享的轻量目录。','本地编辑服务条目并导出静态 HTML。','列出 6 个真实服务，每个写清交付物和周期。']
    ];let i=0;const card=document.getElementById('card'),toast=document.getElementById('toast');function render(){const x=ideas[i];card.innerHTML=`<div class="kicker"><span>${x[1]}</span><span>${i+1} / ${ideas.length}</span></div><h1>${x[0]}</h1><p class="summary">${x[2]}</p><div class="split"><section class="block"><h2>MVP scope</h2><p>${x[3]}</p></section><section class="block"><h2>First 30 minutes</h2><p>${x[4]}</p></section></div>`}function show(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1200)}document.getElementById('next').onclick=()=>{i=(i+1)%ideas.length;render();show('Showing next match')};document.getElementById('reject').onclick=()=>{i=(i+1)%ideas.length;render();show('Rejected for this session')};document.getElementById('pin').onclick=()=>show('Pinned: '+ideas[i][0]);document.getElementById('edit').onclick=()=>{const v=prompt('Edit generation brief','想快速进入心流 · 2 hours · React');if(v)document.getElementById('contextText').textContent='Mood: '+v};render();
  </script>
</body>
</html>
