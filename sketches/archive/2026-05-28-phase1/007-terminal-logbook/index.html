<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Terminal Logbook - Project Idea Pool</title>
  <style>:root{color-scheme:dark;--bg:#050505;--text:#d8d4df;--muted:#8b8494;--dim:#5f5967;--accent:#c084fc;--green:#9ee6b4;--line:#24212b;--mono:"JetBrains Mono","Fira Code",ui-monospace,SFMono-Regular,Menlo,monospace}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:var(--mono);font-size:14px;line-height:1.48;overflow-x:hidden}.terminal{width:min(1060px,calc(100vw - 32px));margin:0 auto;padding:28px 0 80px}.top{border-bottom:1px solid var(--line);padding-bottom:18px;margin-bottom:18px}.prompt{color:var(--accent)}.inputline{display:flex;gap:10px;align-items:center}.inputline input{flex:1;min-width:0;border:0;outline:0;background:transparent;color:var(--text);font:inherit}.inputline button{border:1px solid var(--line);background:#0d0b11;color:var(--green);font:inherit;padding:6px 9px;cursor:pointer}.help{color:var(--dim);margin-top:9px}.log{white-space:normal}.entry{border-bottom:1px solid var(--line);padding:18px 0}.head{color:#fff}.id{color:var(--accent)}.score{color:var(--green)}.label{color:var(--dim)}.indent{padding-left:28px}.entry p{margin:5px 0;color:var(--text)}.tags{color:var(--muted)}.copy{color:var(--accent);cursor:pointer;text-decoration:underline;text-underline-offset:3px}.cursor{display:inline-block;width:8px;height:15px;background:var(--accent);vertical-align:-2px;animation:blink 1s steps(1) infinite}@keyframes blink{50%{opacity:0}}.toast{position:fixed;right:16px;bottom:16px;border:1px solid var(--line);background:#0d0b11;padding:10px 12px;opacity:0;transform:translateY(8px);transition:.15s}.toast.show{opacity:1;transform:none}@media(max-width:680px){body{font-size:13px}.inputline{align-items:flex-start}.inputline button{margin-top:28px}.indent{padding-left:14px}}</style>
</head>
<body><main class="terminal"><section class="top"><div class="inputline"><span class="prompt">idea-pool $</span><input id="cmd" value="generate --mood='想写点东西' --time=2h --stack=react --no-backend"><button id="run">run</button></div><div class="help">type a command, run again, or click copy on any section. output is plain-text friendly by design.<span class="cursor"></span></div></section><section class="log" id="log"></section></main><div class="toast" id="toast">copied section</div><script>
const ideas=[['001','个人项目灵感池 Agent','98','把状态、时间和技术偏好转成今天可执行的项目。','本地表单 + deterministic 排序 + Markdown 导出。','先整理 seed JSON，补齐 first action。','react typescript local-first'],['002','Agent Pack 生成器','93','生成给 AI coding agent 的任务包、边界、验收清单。','输入目标和栈，输出 README handoff。','写一份 Agent Pack 模板并用本项目测试。','markdown prompt templates'],['003','思路清仓工具','88','把脑中杂念倒出并分成 now / later / trash。','大文本框、拆分条目、键盘分类。','实现 paste-to-items。','react keyboard indexeddb'],['004','README Hero 生成器','84','给个人项目生成第一屏 README。','标题、定位、截图占位、quick start。','拆 5 个优秀 README hero。','markdown clipboard'],['005','个人服务目录','79','整理自己能提供的小服务，导出静态目录。','本地编辑 JSON，生成静态 HTML。','写 6 个真实服务条目。','static html json']];const log=document.getElementById('log'),toast=document.getElementById('toast');function render(){log.innerHTML='<div class="label"># generated at local session / no network / no llm api</div>'+ideas.map(x=>`<article class="entry"><div class="head"><span class="id">[${x[0]}]</span> ${x[1]} <span class="score">score=${x[2]}</span> <span class="copy">copy</span></div><div class="indent"><p><span class="label">summary:</span> ${x[3]}</p><p><span class="label">mvp:</span> ${x[4]}</p><p><span class="label">first_30m:</span> ${x[5]}</p><p class="tags"><span class="label">stack:</span> ${x[6]}</p></div></article>`).join('')}document.getElementById('run').onclick=()=>{render();show('log regenerated')};log.onclick=e=>{if(e.target.className==='copy')show('copied terminal section')};function show(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1100)}render();
</script></body></html>
