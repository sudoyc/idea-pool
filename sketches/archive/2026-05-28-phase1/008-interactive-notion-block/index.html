<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Interactive Notion Block - Project Idea Pool</title>
  <style>:root{color-scheme:dark;--bg:#0a0810;--text:#f4eefc;--muted:#b5adbf;--dim:#7f778a;--line:rgba(255,255,255,.1);--accent:#c084fc;--done:#8ee6b0;--sans:Inter,"Noto Sans SC","PingFang SC","Microsoft YaHei",system-ui,sans-serif;--mono:"JetBrains Mono",ui-monospace,monospace}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden}.page{width:min(760px,calc(100vw - 34px));margin:0 auto;padding:58px 0 90px}.crumb{font:700 11px/1 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:26px}.sentence{font-size:clamp(23px,4vw,30px);line-height:1.42;letter-spacing:-.025em;margin-bottom:36px}.blank{display:inline-block;min-width:120px;border-bottom:1px solid rgba(192,132,252,.65);color:#eadcff;outline:0;padding:0 4px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:44px}.toolbar button{border:1px solid var(--line);background:transparent;color:var(--muted);border-radius:999px;padding:8px 11px;font-weight:700;cursor:pointer}.toolbar button.active{color:#fff;border-color:rgba(192,132,252,.45);background:rgba(192,132,252,.1)}.doc h1{font-size:clamp(32px,5vw,46px);line-height:1.08;letter-spacing:-.045em;margin:0 0 18px}.doc .lead{font-size:17px;line-height:1.8;color:#ded6e8;margin:0 0 42px}.doc h2{font-size:22px;margin:42px 0 12px;letter-spacing:-.02em}.doc p{font-size:16px;line-height:1.82;color:var(--muted);margin:0 0 18px}.todo{display:flex;gap:12px;align-items:flex-start;margin-top:16px;padding:13px 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);cursor:pointer}.box{width:18px;height:18px;border:1px solid rgba(192,132,252,.65);margin-top:4px;display:grid;place-items:center;color:var(--done);font-size:13px}.todo.done .box:before{content:'✓'}.todo.done .todo-text{text-decoration:line-through;color:var(--dim)}.tags{margin-top:38px;color:var(--dim);font:650 13px/1.8 var(--mono)}.toast{position:fixed;right:18px;bottom:18px;border:1px solid var(--line);background:#15111d;border-radius:12px;padding:11px 13px;font-size:13px;opacity:0;transform:translateY(8px);transition:.16s}.toast.show{opacity:1;transform:none}@media(max-width:620px){.page{padding-top:36px}.sentence{margin-bottom:24px}.toolbar{margin-bottom:32px}}</style>
</head><body><main class="page"><div class="crumb">Generated Note / Local First</div><section class="sentence">今天我想用 <span class="blank" contenteditable="true">React</span> 在 <span class="blank" contenteditable="true">2 小时</span> 内做一个 <span class="blank" contenteditable="true">能马上用的小工具</span>。</section><nav class="toolbar" id="tabs"><button class="active" data-i="0">灵感池</button><button data-i="1">Agent Pack</button><button data-i="2">清仓工具</button><button data-i="3">README Hero</button><button data-i="4">服务目录</button></nav><article class="doc" id="doc"></article></main><div class="toast" id="toast">First action marked done</div><script>
const ideas=[['个人项目灵感池 Agent','把当前心情、时间和技术偏好转成可执行的 vibe coding 项目卡片。','它不是通用待办，而是一个启动项目的 writing surface。用户只需要描述状态，页面就把冲动翻译成项目。','本地输入、deterministic 推荐、Markdown 导出。不要后端，不接 LLM API。','整理 seed ideas，补齐字段，并先实现推荐排序。','#React #TypeScript #localStorage'],['Agent Pack 生成器','把模糊需求改写成 AI coding agent 可以执行的任务包。','当 agent 变成日常协作者，好的交接文档会比更复杂的 prompt 更有价值。','输出目标、边界、文件、验证命令、交付格式。','写 Agent Pack 模板并用当前 UI redesign 任务测试。','#Markdown #PromptDesign'],['思路清仓工具','把脑中杂念快速倒出来，再整理成现在做、以后做、直接丢弃。','先清空上下文，才更容易进入 vibe coding 的心流。','大文本输入、条目拆分、三段状态、键盘操作。','实现多行 paste 自动拆分为条目。','#PersonalOS #Keyboard'],['README Hero 生成器','生成个人项目 README 的第一屏。','小项目常常死在“不会介绍自己”，这个工具让展示变成最后 10 分钟的事。','项目名、定位句、三条功能点、快速开始、截图占位。','拆解 5 个优秀 README hero。','#Writing #Markdown'],['个人服务目录','整理自己能提供的小服务，并导出一个轻量目录。','个人能力需要稳定入口，而不是散落在聊天记录。','本地编辑服务条目，按对象筛选，导出静态 HTML。','列出 6 个真实可交付服务。','#StaticHTML #JSON']];let idx=0;const doc=document.getElementById('doc'),toast=document.getElementById('toast');function render(){const x=ideas[idx];doc.innerHTML=`<h1>${x[0]}</h1><p class="lead">${x[1]}</p><h2>Why now</h2><p>${x[2]}</p><h2>MVP scope</h2><p>${x[3]}</p><h2>First action</h2><div class="todo" id="todo"><span class="box"></span><span class="todo-text">${x[4]}</span></div><div class="tags">${x[5]}</div>`;document.getElementById('todo').onclick=e=>{e.currentTarget.classList.toggle('done');toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1100)}}document.getElementById('tabs').onclick=e=>{if(!e.target.matches('button'))return;idx=Number(e.target.dataset.i);document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('active',b===e.target));render()};render();
</script></body></html>
